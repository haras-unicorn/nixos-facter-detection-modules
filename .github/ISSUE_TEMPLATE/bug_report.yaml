name: Bug Report
description:
  "Create a report of behavior that doesn't seem to be intended and help us
  improve"
labels: ["bug"]
body:
  - type: checkboxes
    attributes:
      label: Bug report form
      description: Thank you for your bug report.
      options:
        - label:
            I have done a basic search of the issue tracker to find any existing
            issues that are similar.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description:
        Try to make it easy for me to understand what problem you are
        encountering.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description:
        Steps to reproduce the behavior (including succinct code examples or
        screenshots of the observed behavior).
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description:
        A clear and concise description of what you expected to happen.
      placeholder: I expected nu to...
    validations:
      required: true
